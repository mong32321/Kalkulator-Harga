<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Konversi Harga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles to hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-8">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">Kalkulator Harga</h1>
            <p class="text-sm text-gray-500 mt-1">Konversi angka ke kode dan sebaliknya</p>
        </div>

        <!-- Section: Angka ke Kode -->
        <div class="space-y-3">
            <label class="block text-sm font-semibold text-gray-700">Ubah Angka menjadi Kode</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <span class="text-gray-500 font-medium">Rp</span>
                </div>
                <input type="number" id="inputAngka" 
                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                    placeholder="Masukkan nominal angka (misal: 150000)"
                    oninput="konversiKeKode()">
            </div>
            <div class="bg-blue-50 border border-blue-100 rounded-lg p-4 mt-2 min-h-[3rem] flex items-center justify-between">
                <span class="text-sm text-blue-800 font-medium">Hasil Kode:</span>
                <span id="hasilKode" class="text-lg font-bold text-blue-900 break-all">-</span>
            </div>
        </div>

        <hr class="border-gray-200">

        <!-- Section: Kode ke Angka -->
        <div class="space-y-3">
            <label class="block text-sm font-semibold text-gray-700">Ubah Kode menjadi Angka</label>
            <input type="text" id="inputKode" 
                class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors uppercase"
                placeholder="Masukkan kode huruf..."
                oninput="konversiKeAngka()">
            <div class="bg-green-50 border border-green-100 rounded-lg p-4 mt-2 min-h-[3rem] flex items-center justify-between">
                <span class="text-sm text-green-800 font-medium">Hasil Angka:</span>
                <span id="hasilAngka" class="text-lg font-bold text-green-900 break-all">-</span>
            </div>
        </div>
    </div>

    <script>
        // Peta Konversi Angka ke Huruf
        const petaAngkaKeHuruf = {
            '0': 'V',
            '1': 'I',
            '2': 'T',
            '3': 'A',
            '4': 'K',
            '5': 'U',
            '6': 'M',
            '7': 'O',
            '8': 'P',
            '9': 'L'
        };

        // Membangun Peta Konversi Huruf ke Angka secara otomatis
        const petaHurufKeAngka = {};
        for (let angka in petaAngkaKeHuruf) {
            let huruf = petaAngkaKeHuruf[angka];
            petaHurufKeAngka[huruf] = angka;
            petaHurufKeAngka[huruf.toLowerCase()] = angka; // Mendukung huruf kecil
        }

        // Fungsi Format Rupiah
        function formatRupiah(angkaStr) {
            if (!angkaStr || isNaN(angkaStr)) return angkaStr;
            return "Rp " + parseInt(angkaStr, 10).toLocaleString('id-ID');
        }

        // Fungsi mengubah Angka -> Kode
        function konversiKeKode() {
            const input = document.getElementById('inputAngka').value;
            const hasilEl = document.getElementById('hasilKode');
            
            if (input.trim() === '') {
                hasilEl.textContent = '-';
                return;
            }

            let hasil = '';
            for (let char of input) {
                if (petaAngkaKeHuruf[char]) {
                    hasil += petaAngkaKeHuruf[char];
                } else {
                    hasil += char; // Biarkan karakter lain (seperti titik/koma) apa adanya
                }
            }
            hasilEl.textContent = hasil;
        }

        // Fungsi mengubah Kode -> Angka
        function konversiKeAngka() {
            let input = document.getElementById('inputKode').value;
            const hasilEl = document.getElementById('hasilAngka');
            
            // Otomatis ubah input menjadi huruf besar di kolom teks
            document.getElementById('inputKode').value = input.toUpperCase();
            
            if (input.trim() === '') {
                hasilEl.textContent = '-';
                return;
            }

            let hasil = '';
            for (let char of input) {
                if (petaHurufKeAngka[char]) {
                    hasil += petaHurufKeAngka[char];
                } else {
                    hasil += char; // Jika huruf tidak ada di pola, biarkan saja
                }
            }

            // Tampilkan hasil dengan format Rupiah jika memungkinkan, jika tidak tampilkan angka mentah
            if (/^\d+$/.test(hasil)) {
                hasilEl.textContent = formatRupiah(hasil);
            } else {
                hasilEl.textContent = hasil;
            }
        }
    </script>
</body>
</html>
